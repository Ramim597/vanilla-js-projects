<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>random qoute generator</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Random quote generator</h1>
    <button id="btn" style="cursor: pointer">GENERATE</button>
    <div>
      <h3 id="qoute">Click to the button to get a quote</h3>
      <div class="copy-text">
        <i class="fa-regular fa-copy"></i>
        <!--copy icon-->
        <label id="icon" for="icon" style="cursor: pointer">Copy</label>
      </div>
      <p>Author: <span id="auth">ramim</span></p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
